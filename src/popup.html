<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MailBlast Lite</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; width: 340px; background: #0f1117; color: #e6e9ef; }
      .wrap { padding: 12px; }
      .title { font-weight: 700; margin-bottom: 8px; }
      .btn { background: #1b1f2a; color: #e6e9ef; border: 1px solid #2a2f3a; border-radius: 10px; padding: 8px 10px; cursor: pointer; }
      .row { display: flex; gap: 8px; align-items: center; }
      a { color: #7aa2f7; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="title">MailBlast Lite</div>
      <div class="row">
        <button id="signIn" class="btn">Sign in with Google</button>
        <button id="openGmail" class="btn">Open Gmail</button>
      </div>
      <p style="opacity:.7;margin-top:10px">Use the in-Gmail panel to create campaigns and track analytics.</p>
      <script>
        document.getElementById('signIn').onclick = () => chrome.runtime.sendMessage({ type: 'auth.signIn' });
        document.getElementById('openGmail').onclick = () => chrome.tabs.create({ url: 'https://mail.google.com' });
      </script>
    </div>
  </body>
  </html>
